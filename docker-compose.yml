services:

  app:
    build: .
    container_name: job-tracker-app

    ports:
      - "5000:5000"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jobtracker
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0

    depends_on:
      - postgres
      - redis

    restart: always

  postgres:
    image: postgres:16
    container_name: job-tracker-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobtracker

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

  redis:
    image: redis:7
    container_name: job-tracker-redis

    ports:
      - "6379:6379"

    restart: always

  celery:
    build: .
    container_name: job-tracker-celery

    command: celery -A celery_app.celery worker --pool=solo --loglevel=info

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jobtracker
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0

    depends_on:
      - postgres
      - redis

    restart: always

  flower:
    image: mher/flower
    container_name: job-tracker-flower

    command: celery --broker=redis://redis:6379/0 flower --port=5555

    ports:
      - "5555:5555"

    depends_on:
      - redis

    restart: always

volumes:
  postgres_data: